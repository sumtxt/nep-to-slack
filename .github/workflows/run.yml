name: NEP to Slack

on:
  workflow_dispatch:
    inputs:
      nep_name:
        description: "NEP identifier (e.g. nep-mig)"
        required: false
        default: "nep-mig"
      skip_dedup:
        description: "Skip deduplication and post all papers"
        required: false
        default: "false"
  schedule:
    - cron: "55 23 * * *"

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Restore memory file
        uses: actions/cache@v4
        with:
          path: memory/url.txt
          key: nep-memory-${{ github.event.inputs.nep_name || 'nep-mig' }}
          restore-keys: nep-memory-${{ github.event.inputs.nep_name || 'nep-mig' }}

      - name: Fetch and post papers
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          NEP_NAME: ${{ github.event.inputs.nep_name || 'nep-mig' }}
          SKIP_DEDUP: ${{ github.event.inputs.skip_dedup || 'false' }}
        run: python main.py

      - name: Save memory file
        uses: actions/cache/save@v4
        with:
          path: memory/url.txt
          key: nep-memory-${{ github.event.inputs.nep_name || 'nep-mig' }}-${{ github.run_id }}
