name: NEP to Slack

on:
  workflow_dispatch:
    inputs:
      nep_name:
        description: "NEP identifier (e.g. nep-mig)"
        required: false
        default: "nep-mig"
      skip_dedup:
        description: "Skip deduplication and post all papers"
        required: false
        default: "false"
  schedule:
    - cron: "55 23 * * *"

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch and post papers
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          NEP_NAME: ${{ github.event.inputs.nep_name || 'nep-mig' }}
          SKIP_DEDUP: ${{ github.event.inputs.skip_dedup || 'false' }}
        run: python main.py

      - name: Commit memory file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add memory/url.txt
          git diff --cached --quiet || git commit -m "update memory file [skip ci]"
          git push
